<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ori — paper blooms</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap');

    :root {
      --blue: #A8CEDE;
      --sky: #C8E4F0;
      --cream: #FFF0E6;
      --brown: #6B3A2A;
      --dark: #0A2A3A;
      --sage: #8FBF8F;
      --butter: #F5D98A;
      --peach: #F2994A;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Bai Jamjuree', sans-serif;
      background: var(--cream);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .page {
      display: none;
      padding-bottom: 80px;
    }

    .page.active {
      display: block;
    }

    /* TOP BAR */
    .topbar {
      background: var(--blue);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
    }

    .topbar-sub {
      font-size: 9px;
      color: #1A5A7A;
      font-weight: 300;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      background: white;
      border-top: 0.5px solid #E8D4C0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      padding: 10px 0 16px;
      z-index: 100;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      color: #8B6A52;
      font-size: 10px;
      font-weight: 500;
    }

    .nav-item.active {
      color: var(--dark);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    /* HERO */
    .hero {
      background: var(--dark);
      margin: 16px;
      border-radius: 16px;
      padding: 18px 20px;
    }

    .hero-slogan {
      font-size: 15px;
      color: var(--cream);
      font-style: italic;
      line-height: 1.3;
    }

    .hero-voice {
      font-size: 11px;
      color: var(--blue);
      margin-top: 8px;
      font-style: italic;
    }

    .btn-primary {
      background: var(--blue);
      border: none;
      border-radius: 20px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      cursor: pointer;
      margin-top: 12px;
      display: inline-block;
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .section {
      padding: 0 16px;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 12px;
    }

    /* PRODUCT */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .product-card {
      background: white;
      border-radius: 14px;
      border: 0.5px solid #E8D4C0;
      overflow: hidden;
      cursor: pointer;
      touch-action: manipulation;
    }

    .product-img {
      height: 110px;
      background: var(--sky);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-info {
      padding: 10px;
    }

    .product-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--dark);
    }

    .product-desc {
      font-size: 10px;
      color: #8B6A52;
      font-weight: 300;
      margin-top: 2px;
    }

    .product-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark);
      margin-top: 6px;
    }

    /* POINTS BANNER */
    .points-card {
      background: var(--dark);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .points-icon {
      background: var(--blue);
      border-radius: 10px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .points-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--cream);
    }

    .points-bar-wrap {
      margin-top: 4px;
      display: flex;
      gap: 3px;
    }

    .points-bar-fill {
      height: 5px;
      background: var(--blue);
      border-radius: 3px;
    }

    .points-bar-empty {
      height: 5px;
      background: #1A3A5A;
      border-radius: 3px;
      flex: 1;
    }

    .points-sub {
      font-size: 10px;
      color: var(--blue);
      font-weight: 300;
      margin-top: 3px;
    }

    /* FORM */
    .form-group {
      margin-bottom: 14px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--brown);
      display: block;
      margin-bottom: 6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 14px;
      border: 0.5px solid #E8D4C0;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      background: white;
      color: var(--dark);
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: var(--blue);
    }

    /* SUMMARY */
    .summary-card {
      background: white;
      border-radius: 14px;
      border: 0.5px solid #E8D4C0;
      padding: 14px;
      margin-bottom: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 0.5px solid #F0E8E0;
      font-size: 13px;
      color: var(--dark);
    }

    .summary-row:last-child {
      border-bottom: none;
    }

    .summary-total {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
    }

    /* SKELETON */
    .skeleton-card {
      background: white;
      border-radius: 14px;
      border: 0.5px solid #E8D4C0;
      overflow: hidden;
    }

    .skeleton-img {
      height: 110px;
      background: linear-gradient(90deg, #e9edf1 25%, #f6f8fa 37%, #e9edf1 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite linear;
    }

    .skeleton-line {
      height: 10px;
      border-radius: 6px;
      margin: 10px;
      background: linear-gradient(90deg, #eceff3 25%, #f7f9fb 37%, #eceff3 63%);
      background-size: 400% 100%;
      animation: shimmer 1.2s infinite linear;
    }

    .skeleton-line.short {
      width: 55%;
    }

    @keyframes shimmer {
      0% {
        background-position: 100% 0
      }

      100% {
        background-position: 0 0
      }
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--brown);
      font-size: 13px;
    }

    /* CALENDAR */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--dark);
      border-radius: 12px 12px 0 0;
    }

    .cal-month-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--cream);
    }

    .cal-nav {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 20px;
      cursor: pointer;
      padding: 2px 10px;
      line-height: 1;
      font-family: inherit;
    }

    .cal-nav:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .cal-grid-wrap {
      background: white;
      border: 0.5px solid #E8D4C0;
      border-top: none;
      border-radius: 0 0 12px 12px;
      overflow: hidden;
    }

    .cal-day-labels {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: var(--sky);
    }

    .cal-day-label {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--dark);
      padding: 6px 0;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #F0E8E0;
    }

    .cal-cell {
      background: white;
      text-align: center;
      padding: 10px 0;
      font-size: 13px;
      color: var(--dark);
      cursor: pointer;
    }

    .cal-cell:hover:not(.cal-disabled):not(.cal-empty) {
      background: var(--sky);
    }

    .cal-cell.cal-selected {
      background: var(--blue) !important;
      color: var(--dark);
      font-weight: 700;
    }

    .cal-cell.cal-disabled {
      color: #CCBBAA;
      cursor: default;
      background: #FAF5F0;
    }

    .cal-cell.cal-empty {
      cursor: default;
      background: white;
    }

    .cal-cell.cal-today {
      font-weight: 700;
      color: var(--peach);
    }

    .cal-selected-label {
      font-size: 12px;
      color: var(--blue);
      margin-top: 8px;
      font-style: italic;
      min-height: 18px;
    }

    /* POINTS PAGE */
    .pts-hero {
      background: var(--blue);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .pts-hero-top {
      padding: 20px 20px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pts-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--sky);
      overflow: hidden;
      flex-shrink: 0;
      border: 2.5px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .pts-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pts-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
    }

    .pts-tier-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--dark);
      color: var(--cream);
      margin-top: 5px;
    }

    .pts-discount-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--sage);
      color: #0A2A0A;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: 5px;
    }

    .pts-hero-bottom {
      background: var(--dark);
      padding: 16px 20px;
    }

    .pts-count {
      font-size: 44px;
      font-weight: 700;
      color: white;
      line-height: 1;
    }

    .pts-count-label {
      font-size: 12px;
      color: var(--blue);
      font-weight: 300;
      margin-top: 2px;
    }

    .pts-progress-row {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pts-progress-bar {
      flex: 1;
      height: 6px;
      background: #1A3A5A;
      border-radius: 3px;
      overflow: hidden;
    }

    .pts-progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 3px;
    }

    .pts-progress-label {
      font-size: 10px;
      color: var(--blue);
      font-weight: 300;
      white-space: nowrap;
    }

    .pts-section {
      background: white;
      border-radius: 14px;
      border: 0.5px solid #E8D4C0;
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .pts-section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--brown);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .pts-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 0.5px solid #F5EDE4;
      font-size: 13px;
    }

    .pts-info-row:last-child {
      border-bottom: none;
    }

    .pts-info-label {
      color: #8B6A52;
    }

    .pts-info-value {
      color: var(--dark);
      font-weight: 600;
      text-align: right;
    }

    .pts-earn-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 0.5px solid #F5EDE4;
      font-size: 12px;
      color: var(--dark);
    }

    .pts-earn-row:last-child {
      border-bottom: none;
    }

    .pts-earn-icon {
      font-size: 16px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .pts-earn-note {
      font-size: 10px;
      color: #8B6A52;
      margin-top: 2px;
    }

    .birth-editor {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .birth-editor select {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
    }

    .birth-editor .birth-save-btn {
      background: var(--blue);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--dark);
      cursor: pointer;
      white-space: nowrap;
    }

    .birth-edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      padding: 2px 6px;
      color: var(--brown);
      vertical-align: middle;
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div>
      <div class="topbar-name">Ori</div>
      <div class="topbar-sub">paper flowers</div>
    </div>
    <div id="user-avatar"
      style="width:32px;height:32px;border-radius:50%;background:var(--sky);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;">
      🌸</div>
  </div>

  <!-- HOME -->
  <div id="page-home" class="page active">
    <div class="hero">
      <div class="hero-slogan">paper blooms,<br>real feelings.</div>
      <div class="hero-voice">"สวัสดีค่ะ! โทริดีใจมากที่มานะคะ~"</div>
      <button class="btn-primary" onclick="showPage('catalog')">ดูดอกไม้ทั้งหมด</button>
    </div>
    <div class="points-card" onclick="showPage('points')">
      <div class="points-icon">🌸</div>
      <div style="flex:1">
        <div class="points-title" id="points-title">Petal Points — 0 กลีบ</div>
        <div class="points-bar-wrap">
          <div class="points-bar-fill" id="points-bar" style="width:0%"></div>
          <div class="points-bar-empty"></div>
        </div>
        <div class="points-sub" id="points-sub">เริ่มสะสมกลีบได้เลยค่ะ~</div>
      </div>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 18L15 12L9 6" stroke="#A8CEDE" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
    <div class="section">
      <div class="section-title">โทริแนะนำ</div>
      <div class="product-grid" id="featured-products"></div>
    </div>
  </div>

  <!-- CATALOG -->
  <div id="page-catalog" class="page">
    <div style="padding:16px 16px 8px">
      <div class="section-title">เลือกดอกไม้เลยนะคะ~</div>
    </div>
    <div class="section">
      <div class="product-grid" id="all-products"></div>
    </div>
  </div>

  <!-- ORDER FORM -->
  <div id="page-order" class="page">
    <div style="padding:16px">
      <div style="margin-bottom:16px">
        <div class="section-title">กรอกรายละเอียดค่ะ~</div>
      </div>
      <div id="selected-product-info" class="summary-card" style="margin-bottom:16px"></div>
      <div class="form-group">
        <label>ข้อความในการ์ด (ถ้ามี)</label>
        <textarea id="card-message" rows="2" placeholder="โทริจะเขียนให้เลยนะคะ~"></textarea>
      </div>
      <div class="form-group">
        <label>ที่อยู่จัดส่ง</label>
        <textarea id="address" rows="3" placeholder="บ้านเลขที่ ซอย ถนน แขวง เขต จังหวัด รหัสไปรษณีย์"
          required></textarea>
      </div>
      <div class="form-group">
        <label>เบอร์โทรศัพท์</label>
        <input type="tel" id="phone" placeholder="08X-XXX-XXXX" required>
      </div>
      <div class="form-group">
        <label>วันที่ต้องการรับ</label>
        <input type="hidden" id="delivery-date">
        <div id="calendar-wrap"></div>
        <div class="cal-selected-label" id="selected-date-display"></div>
      </div>
      <button class="btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:12px;margin-top:4px"
        onclick="goToSummary()">ดูสรุปออเดอร์</button>
    </div>
  </div>

  <!-- SUMMARY -->
  <div id="page-summary" class="page">
    <div style="padding:16px">
      <div style="margin-bottom:16px">
        <div class="section-title">สรุปออเดอร์ค่ะ~</div>
      </div>
      <div class="summary-card" id="summary-content"></div>
      <div
        style="background:#0A2A3A;border-radius:12px;padding:12px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start">
        <div style="font-size:24px;flex-shrink:0">🌸</div>
        <p style="font-size:12px;color:#A8CEDE;font-style:italic">"โทริจะพับดอกไม้ให้ด้วยใจเลยนะคะ~"</p>
      </div>
      <button class="btn-primary" style="width:100%;padding:14px;font-size:14px;border-radius:12px"
        onclick="submitOrder()">ยืนยันและส่งออเดอร์</button>
      <button onclick="showPage('order')"
        style="width:100%;padding:12px;font-size:13px;border-radius:12px;background:transparent;border:0.5px solid #E8D4C0;font-family:inherit;color:var(--brown);cursor:pointer;margin-top:8px">แก้ไข</button>
    </div>
  </div>

  <!-- POINTS -->
  <div id="page-points" class="page">
    <div style="padding:16px">
      <div id="points-detail"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 12L12 3L21 12V21H15V15H9V21H3V12Z" stroke="currentColor" stroke-width="1.8"
          stroke-linejoin="round" />
      </svg>หน้าแรก
    </div>
    <div class="nav-item" id="nav-catalog" onclick="showPage('catalog')">
      <svg viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
        <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
        <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8" />
      </svg>สินค้า
    </div>
    <div class="nav-item" id="nav-points" onclick="showPage('points')">
      <svg viewBox="0 0 24 24" fill="none">
        <path
          d="M12 2C10 2 8 3.5 7.5 5.5C5.5 4.5 3 5.5 2 7.5C1 9.5 2 11.5 4 12.5C2 13.5 1 15.5 2 17.5C3 19.5 5.5 20.5 7.5 19.5C8 21.5 10 23 12 23C14 23 16 21.5 16.5 19.5C18.5 20.5 21 19.5 22 17.5C23 15.5 22 13.5 20 12.5C22 11.5 23 9.5 22 7.5C21 5.5 18.5 4.5 16.5 5.5C16 3.5 14 2 12 2Z"
          stroke="currentColor" stroke-width="1.8" />
      </svg>แต้ม
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyLtcdWTZ1I5h0pqSJ1yLaKdiK4bgkIyqTuJQvjRUGc6_aQDzQJvkbiIo-eNsPN0w5O/exec'
    const LIFF_ID = '2009801886-j4H29HTq'
    const CATALOG_CACHE_KEY = 'ori_catalog_cache_v1'
    const CATALOG_CACHE_TTL_MS = 60000
    const FALLBACK_CATALOG = [
      { product_id: '1', ชื่อสินค้า: 'ช่อ 5 กลีบ', ราคา: 290, รายละเอียด: 'พับด้วยมือ · 2-3 วัน', สถานะ: 'active', image_url: '', image_thumb_url: '' },
      { product_id: '2', ชื่อสินค้า: 'ช่อ Butter', ราคา: 350, รายละเอียด: 'edition พิเศษ · 3-4 วัน', สถานะ: 'active', image_url: '', image_thumb_url: '' }
    ]
    const TH_DAYS = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์']

    function formatExpireDate(raw) {
        if (!raw) return ''
        // ถ้าเป็น Date object string เช่น "Thu Dec 31 2026 00:00:00 GMT+0700"
        const d = new Date(raw)
        if (!isNaN(d.getTime())) {
          const day = String(d.getDate()).padStart(2, '0')
          const month = String(d.getMonth() + 1).padStart(2, '0')
          const year = d.getFullYear()
          return day + '/' + month + '/' + year
        }
        // ถ้าเป็น string ธรรมดาอยู่แล้ว ส่งกลับตรงๆ
        return String(raw)
      }

        '<div class="pts-info-row" style="display:block"><div class="pts-info-label" style="margin-bottom:6px">เดือนเกิด</div>' + birthHtml + '</div>' +

        '<div class="pts-earn-row"><div class="pts-earn-icon">🎂</div><div><div>+3 กลีบฟรีในเดือนเกิด</div><div class="pts-earn-note">Tori แจ้งในแชทอัตโนมัติ</div></div></div>' +

    function showBirthEditor() {
      const row = document.querySelector('#points-detail .pts-info-row:last-child > div:last-child')
      if (!row) return
      const monthOptions = TH_MONTHS.map(function (m, i) { return '<option value="' + (i + 1) + '"' + (userMeta.birth_month === (String(i + 1)) ? ' selected' : '') + '>' + m + '</option>' }).join('')
      row.innerHTML = '<div class="birth-editor"><select id="birth-month-select"><option value="">เลือกเดือนเกิด</option>' + monthOptions + '</select><button class="birth-save-btn" onclick="saveBirthMonthFromDropdown()">บันทึก</button></div>'

    async function saveBirthMonthFromDropdown() {
      const sel = document.getElementById('birth-month-select')
      const month = sel ? sel.value : ''
      if (!month) { alert('กรุณาเลือกเดือนเกิดก่อนนะคะ~'); return }
      const ok = await saveBirthMonth(month)
      if (ok) { userMeta.birth_month = month; updatePointsUI() }
    }

    async function saveBirthMonth(month) {
      try {
        const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: 'update_profile', line_user_id: currentUser.userId, name: currentUser.displayName || '', birth_month: month }) })
        const txt = await res.text()
        let d = {}; try { d = txt ? JSON.parse(txt) : {} } catch (_) { throw new Error('response_not_json: ' + txt.slice(0, 120)) }
        if (!res.ok || !d.ok) throw new Error(d.error || 'update_profile_failed')
        return true
      } catch (e) { console.log('saveBirthMonth error', e); alert('บันทึกเดือนเกิดไม่สำเร็จค่ะ: ' + (e && e.message ? e.message : e)); return false }
    }

    async function loadCatalog() {
      const now = Date.now()
      const est = getEstSkeleton()
      renderSkeleton('featured-products', Math.min(4, est))
      renderSkeleton('all-products', est)
      try { const c = JSON.parse(localStorage.getItem(CATALOG_CACHE_KEY) || 'null'); if (c && Array.isArray(c.data) && (now - Number(c.ts || 0) < CATALOG_CACHE_TTL_MS)) { catalog = c.data; renderProducts() } } catch (e) { }
      try {
        const res = await fetch(APPS_SCRIPT_URL + '?type=catalog')
        const fresh = await res.json()
        if (!Array.isArray(fresh)) throw new Error('not array')
        catalog = fresh; renderProducts()
        localStorage.setItem(CATALOG_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: fresh }))
      } catch (e) { console.log('load catalog error', e); if (!catalog.length) { catalog = FALLBACK_CATALOG; renderProducts() } }
    }

    function renderProductCard(p) {
      const url = imgUrl(p)
      const img = url ? '<img src="' + esc(url) + '" alt="' + esc(p['ชื่อสินค้า'] || 'product') + '" loading="lazy" decoding="async">' : '🌸'
      const id = String(p['product_id'] || '').replace(/"/g, '&quot;')
      return '<div class="product-card" data-product-id="' + id + '"><div class="product-img">' + img + '</div><div class="product-info"><div class="product-name">' + esc(p['ชื่อสินค้า'] || '-') + '</div><div class="product-desc">' + esc(p['รายละเอียด'] || '') + '</div><div class="product-price">฿ ' + Number(p['ราคา'] || 0).toLocaleString() + '</div></div></div>'
    }
    function renderProducts() {
      const active = catalog.filter(function (p) { return String((p && p['สถานะ']) || '').toLowerCase() === 'active' })
      localStorage.setItem('ori_catalog_last_count', String(active.length))
      document.getElementById('featured-products').innerHTML = active.slice(0, 4).map(renderProductCard).join('') || '<div class="loading">ยังไม่มีสินค้านะคะ~</div>'
      document.getElementById('all-products').innerHTML = active.map(renderProductCard).join('') || '<div class="loading">ยังไม่มีสินค้านะคะ~</div>'
    }
    function renderSkeleton(id, n) { document.getElementById(id).innerHTML = Array.from({ length: n }).map(function () { return '<div class="skeleton-card"><div class="skeleton-img"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>' }).join('') }
    function getEstSkeleton() { const l = Number(localStorage.getItem('ori_catalog_last_count') || 0); if (l > 0) return Math.min(Math.max(l, 4), 24); try { const c = JSON.parse(localStorage.getItem(CATALOG_CACHE_KEY) || 'null'); if (c && Array.isArray(c.data)) { const n = c.data.filter(function (p) { return String((p && p['สถานะ']) || '').toLowerCase() === 'active' }).length; if (n > 0) return Math.min(Math.max(n, 4), 24) } } catch (_) { } return 6 }

    // CALENDAR
    function initCalendar() {
      const today = new Date()
      const min = new Date(today); min.setDate(today.getDate() + 3)
      const max = new Date(today); max.setDate(today.getDate() + 90)
      calState = { year: min.getFullYear(), month: min.getMonth(), selected: '', minYmd: ymd(min), maxYmd: ymd(max) }
      document.getElementById('delivery-date').value = ''
      document.getElementById('selected-date-display').textContent = ''
      renderCalendar()
    }
    function renderCalendar() {
      const wrap = document.getElementById('calendar-wrap'); if (!wrap) return
      const { year: y, month: m, minYmd, maxYmd, selected } = calState
      const todayYmd = ymd(new Date())
      const first = new Date(y, m, 1).getDay()
      const days = new Date(y, m + 1, 0).getDate()
      const minD = new Date(minYmd), maxD = new Date(maxYmd)
      const canPrev = !(y === minD.getFullYear() && m <= minD.getMonth())
      const canNext = !(y === maxD.getFullYear() && m >= maxD.getMonth())
      let cells = Array(first).fill('<div class="cal-cell cal-empty"></div>').join('')
      for (let d = 1; d <= days; d++) {
        const v = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0')
        const dis = v < minYmd || v > maxYmd
        let cls = 'cal-cell' + (dis ? ' cal-disabled' : '') + (v === selected ? ' cal-selected' : '') + (v === todayYmd && v !== selected ? ' cal-today' : '')
        cells += '<div class="' + cls + '"' + (dis ? '' : ' onclick="pickDate(\'' + v + '\')"') + '>' + d + '</div>'
      }
      wrap.innerHTML = '<div class="cal-header"><button class="cal-nav" onclick="calNav(-1)"' + (canPrev ? '' : ' disabled') + '>&#8249;</button><div class="cal-month-label">' + TH_MONTHS[m] + ' ' + (y + 543) + '</div><button class="cal-nav" onclick="calNav(1)"' + (canNext ? '' : ' disabled') + '>&#8250;</button></div><div class="cal-grid-wrap"><div class="cal-day-labels">' + TH_DAYS_SHORT.map(function (d) { return '<div class="cal-day-label">' + d + '</div>' }).join('') + '</div><div class="cal-grid">' + cells + '</div></div>'
    }
    function calNav(dir) { calState.month += dir; if (calState.month > 11) { calState.month = 0; calState.year++ } if (calState.month < 0) { calState.month = 11; calState.year-- } renderCalendar() }
    function pickDate(v) {
      calState.selected = v; document.getElementById('delivery-date').value = v; renderCalendar()
      const d = new Date(v + 'T00:00:00')
      document.getElementById('selected-date-display').textContent = 'เลือก: วัน' + TH_DAYS[d.getDay()] + 'ที่ ' + d.getDate() + ' ' + TH_MONTHS_SHORT[d.getMonth()] + ' ' + (d.getFullYear() + 543)
    }

    function selectProduct(id) {
      selectedProduct = catalog.find(function (p) { return String(p['product_id']) === String(id) })
      if (!selectedProduct) return
      initCalendar()
      const disc = getDiscount()
      const fp = Number(selectedProduct['ราคา'] || 0) - disc
      document.getElementById('selected-product-info').innerHTML = '<div style="font-size:13px;font-weight:600;color:#0A2A3A">' + esc(selectedProduct['ชื่อสินค้า']) + '</div><div style="font-size:11px;color:#8B6A52;margin-top:2px">' + esc(selectedProduct['รายละเอียด'] || '') + '</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><div style="font-size:16px;font-weight:700;color:#0A2A3A">฿ ' + fp.toLocaleString() + '</div>' + (disc > 0 ? '<div style="font-size:11px;color:#8FBF8F">ส่วนลด ' + getDiscountPercent() + '%</div>' : '') + '</div>'
      showPage('order')
    }
    function getDiscountPercent() { return { bud: 0, bloom: 5, blossom: 10 }[userTier] || 0 }
    function getDiscount() { if (!selectedProduct) return 0; return Math.floor(Number(selectedProduct['ราคา'] || 0) * getDiscountPercent() / 100) }

    function goToSummary() {
      const addr = document.getElementById('address').value

      showPage('summary')
    }

            const dl = 'วัน' + TH_DAYS[d.getDay()] + 'ที่ ' + d.getDate() + ' ' + TH_MONTHS_SHORT[d.getMonth()] + ' ' + (d.getFullYear() + 543)
            await liff.sendMessages([{ type: 'flex', altText: 'สรุปออเดอร์จาก Ori', contents: { type: 'bubble', body: { type: 'box', layout: 'vertical', spacing: 'sm', contents: [{ type: 'text', text: 'รับออเดอร์แล้วค่ะ 🌸', weight: 'bold', size: 'lg' }, { type: 'text', text: 'คุณ ' + order.name, size: 'sm', color: '#666666', margin: 'md' }, { type: 'separator', margin: 'md' }, { type: 'text', text: 'สินค้า: ' + order.product, wrap: true, margin: 'md' }, { type: 'text', text: 'ราคาเดิม: ฿ ' + Number(order.original_price).toLocaleString(), size: 'sm', color: '#666666' }, ...(order.discount > 0 ? [{ type: 'text', text: 'ส่วนลด: -฿ ' + Number(order.discount).toLocaleString(), size: 'sm', color: '#2E7D32' }] : []), { type: 'text', text: 'ยอดรวม: ฿ ' + Number(order.price).toLocaleString(), weight: 'bold', size: 'md' }, { type: 'separator', margin: 'md' }, { type: 'text', text: 'วันรับ: ' + dl, margin: 'md' }, { type: 'text', text: 'เบอร์: ' + order.phone }, { type: 'text', text: 'ที่อยู่: ' + order.address, wrap: true }, { type: 'text', text: 'การ์ด: ' + (order.card_message ? '"' + order.card_message + '"' : '-'), wrap: true }, { type: 'text', text: 'paper blooms, real feelings.', size: 'xs', color: '#999999', margin: 'lg' }] } } }])
          } else { warn = 'บันทึกออเดอร์แล้ว แต่ส่งข้อความแชทไม่ได้เพราะไม่ได้เปิดใน LINE client' }
        } catch (e) { console.warn('sendMessages failed:', e); warn = 'บันทึกออเดอร์แล้ว แต่ส่งข้อความสรุปเข้าแชทไม่สำเร็จ' }
        document.getElementById('page-summary').innerHTML = '<div style="text-align:center;padding:60px 20px"><div style="font-size:60px;margin-bottom:16px">🌸</div><div style="font-size:22px;font-weight:700;color:#0A2A3A;margin-bottom:8px">เย้! ออเดอร์มาแล้วค่ะ!</div><div style="font-size:13px;color:#6B3A2A;font-style:italic;margin-bottom:24px">"โทริจะพับดอกไม้ให้ด้วยใจเลยนะคะ~"</div>' + (warn ? '<div style="font-size:12px;color:#8B6A52;margin-bottom:14px">' + warn + '</div>' : '') + '<button class="btn-primary" onclick="showPage(\'home\')">กลับหน้าแรก</button></div>'
      } catch (e) {
        console.log('submit error:', e); alert('ส่งออเดอร์ไม่สำเร็จ: ' + (e && e.message ? e.message : e))
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.textContent = 'ยืนยันและส่งออเดอร์' }
      }
    }

    function bindTaps() {
      ;['featured-products', 'all-products'].forEach(function (id) {
        const el = document.getElementById(id); if (!el || el.dataset.bound === '1') return; el.dataset.bound = '1'
        const fn = function (e) { const c = e.target.closest('.product-card'); if (!c) return; const p = c.getAttribute('data-product-id'); if (p) selectProduct(p) }
        el.addEventListener('click', fn); el.addEventListener('touchend', fn, { passive: true })
      })
    }

    function showPage(name) {
      document.querySelectorAll('.page').forEach(function (p) { p.classList.remove('active') })
      document.querySelectorAll('.nav-item').forEach(function (n) { n.classList.remove('active') })
      document.getElementById('page-' + name).classList.add('active')
      const nav = document.getElementById('nav-' + name); if (nav) nav.classList.add('active')
      if (name === 'order' && selectedProduct) { const w = document.getElementById('calendar-wrap'); if (w && !w.innerHTML.trim()) initCalendar() }
      window.scrollTo(0, 0)
    }

    init()
  </script>
</body>
